# This is to run the alita-robot in production mode with alpine image
# This does optimizations and builds slower
#
# This configuration now uses the base + override pattern:
# - docker-compose.base.yml: Contains shared services (mongodb, redis)
# - docker-compose.override.yml: Contains production-specific alita service config
#
# Usage:
#   docker-compose up                    # Uses base + override (production)
#   docker-compose -f docker-compose.base.yml -f docker-compose.debug.yml up  # Debug mode

include:
  - docker-compose.base.yml

services:
  alita:
    build:
      context: .
      dockerfile: docker/alpine
    container_name: alita-robot
    restart: always
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    networks:
      - alita-network
